---
services:
  postgres:
    image: postgres:18-alpine@sha256:72f702819bc91cac2265cbe78e4c3ef4c45694f83d63a6829657581accd038e1 # pinned 2026-06-01, see https://hub.docker.com/layers/library/postgres/18-alpine/images/sha256-ccfb3a1332f1ade601b73005eda74192167c5ca09c3bd7589c46f61f0490f470
    container_name: bloklid-postgres
    environment:
      POSTGRES_USER: bloklid
      POSTGRES_PASSWORD: bloklid_dev_password
      POSTGRES_DB: bloklid
    ports:
      - "5432:5432"

      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloklid"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bloklid-network
  bloklid:
    # image built locally:
    image: bloklid:latest # Built from: nix build .#bloklid-docker && docker load < result or from 
    # image from registry (uncomment the following line and comment the previous one):
    # image: europe-west3-docker.pkg.dev/hoprassociation/docker-images/bloklid:latest
    container_name: bloklid
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info,blokli_chain_indexer=debug
    volumes:
      - ./config-docker.toml:/config.toml:ro
      - bloklid_data:/data
    ports:
      - "8080:8080"
    command: ["-c", "/config.toml"]
    networks:
      - bloklid-network
    restart: unless-stopped
volumes:
  postgres_data:
  bloklid_data:
networks:
  bloklid-network:
    driver: bridge
