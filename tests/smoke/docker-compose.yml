# Docker Compose configuration for smoke testing blokli
# Tests that blokli can start and become healthy with PostgreSQL and Anvil
#
# Usage:
#   ./run-smoke-test.sh
#   docker compose down -v
#
# Environment variables:
#   REGISTRY_PORT    - Local registry port (default: 5000)
#   BLOKLID_IMAGE    - Docker image to test (default: localhost:5000/bloklid:smoke-test)
services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile.registry
    container_name: blokli-smoke-registry
    ports:
      - "${REGISTRY_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - smoke-test
  postgres:
    image: postgres:18-alpine
    container_name: blokli-smoke-postgres
    environment:
      POSTGRES_USER: bloklid
      POSTGRES_PASSWORD: bloklid_smoke_test
      POSTGRES_DB: bloklid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloklid"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - smoke-test
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: blokli-smoke-anvil
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--block-time"
      - "1"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - smoke-test
  # One-shot service that sends a seed transaction on Anvil so that
  # bloklid's verify_rpc_capabilities() can find a tx to trace.
  seed-tx:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: blokli-smoke-seed-tx
    entrypoint: ["cast"]
    command:
      - "send"
      - "--rpc-url"
      - "http://anvil:8545"
      - "--private-key"
      - "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      - "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      - "--value"
      - "1"
    depends_on:
      anvil:
        condition: service_healthy
    networks:
      - smoke-test
  bloklid:
    image: ${BLOKLID_IMAGE:-localhost:5000/bloklid:smoke-test}
    container_name: blokli-smoke-bloklid
    depends_on:
      registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
      seed-tx:
        condition: service_completed_successfully
    environment:
      RUST_LOG: trace
    volumes:
      - ./${SMOKE_CONFIG:-config-smoke.toml}:/config.toml:ro
    ports:
      - "8080:8080"
    command: ["-c", "/config.toml"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8080/healthz && curl -sf http://localhost:8080/readyz | grep -q '\"status\":\"ready\"'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - smoke-test
networks:
  smoke-test:
    driver: bridge
