{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "blokli.serviceAccountName" . }}-sa
  labels:
    {{- include "blokli.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
