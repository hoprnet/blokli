  - changed-files:
      - any-glob-to-any-file: api/**
crate:blokli-client:
  - changed-files:
      - any-glob-to-any-file: client/**
crate:blokli-db:
  - changed-files:
      - any-glob-to-any-file: db/**
crate:blokli-chain:
  - changed-files:
      - any-glob-to-any-file: chain/**
helm:
  - changed-files:
      - any-glob-to-any-file: charts/**
docker:
  - changed-files:
      - any-glob-to-any-file: docker/**
