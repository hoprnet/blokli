---
################################################################################
# Pull request pipeline for blokli
#
# Validates PR metadata, runs code-quality checks and tests via shared
# workflows, then builds binaries, Docker images, and runs integration tests.
################################################################################
name: PR
on:
  merge_group:
    types: [checks_requested]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
permissions:
  contents: read
concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-pr
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  # ── PR metadata ──────────────────────────────────────────────────────────────
  validate-pr-title:
    name: Validate title
    if: github.event_name == 'pull_request'
    runs-on: depot-ubuntu-22.04-2
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            build
            chore
            docs
            style
            refactor
            perf
            test
          requireScope: false
          ignoreLabels: |
            bot
            ignore-semantic-pull-request
  label:
    name: Add labels
    if: github.event_name == 'pull_request'
    runs-on: depot-ubuntu-22.04-2
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/labeler@77a4082b841706ac431479b7e2bb11216ffef250 # main on 20.02.2025
        with:
          sync-labels: true
      - name: Add "external" label for forked PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REPO: ${{ github.repository }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$HEAD_REPO" != "$BASE_REPO" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "external"
          fi
  # ── Shared checks (lint, pre-commit, audit) ─────────────────────────────────
  checks:
    name: Check
    uses: hoprnet/hopr-workflows/.github/workflows/checks.yaml@bbd22e57cf954c15f0a6051d59329857809141dd # workflow-checks-v1
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      lint_command: "nix develop --command just quick"
      audit_command: "nix run -L .#audit"
      deps: true
      runner_small: depot-ubuntu-22.04-2
      runner_large: depot-ubuntu-22.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  # ── Shared tests (unit) ─────────────────────────────────────────────────────
  tests:
    name: Test
    uses: hoprnet/hopr-workflows/.github/workflows/tests.yaml@268553d7984344080e3dc65eb92778c9103af7ec # workflow-tests-v3
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      unit_tests: true
      unit_test_command: "nix run -L .#test"
      unit_coverage: true
      unit_coverage_command: "nix run .#coverage-unit"
      runner: depot-ubuntu-22.04-4
      test_timeout: 30
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
  # ── Repo-specific: schema validation ────────────────────────────────────────
  schema-validation:
    name: Schema Validation
    runs-on: depot-ubuntu-22.04-4
    timeout-minutes: 30
    needs: checks
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@c8d45034bb33307dfda3b4dfcd1fc4000cadc05a # setup-nix-v1
        with:
          cachix_cache_name: blokli
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Generate GraphQL schema
        run: nix develop --command just export-schema-sqlite
      - name: Validate schema against target
        run: nix develop --command uv run scripts/check_schema.py
  # ── Build: binaries ─────────────────────────────────────────────────────────
  build-binaries:
    name: Binary ${{ matrix.binary }} ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4
            build_command: nix build -L .#binary-blokli-x86_64-linux
            build_file: bloklid/Cargo.toml
            binary: bloklid
            required_label: ""
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4
            build_command: nix build -L .#binary-blokli-aarch64-linux
            build_file: bloklid/Cargo.toml
            binary: bloklid
            required_label: "binary:aarch64-linux"
          - architecture: aarch64-darwin
            runner: depot-macos-15
            build_command: nix build -L .#binary-blokli-aarch64-darwin
            build_file: bloklid/Cargo.toml
            binary: bloklid
            required_label: "binary:aarch64-darwin"
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@build-binaries-v2
    permissions:
      contents: read
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      version_type: commit
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: blokli
      build_file: ${{ matrix.build_file }}
      build_command: ${{ matrix.build_command }}
      binary: ${{ matrix.binary }}
      runner: ${{ matrix.runner }}
      enabled: ${{ matrix.required_label == '' || contains(github.event.pull_request.labels.*.name, matrix.required_label) }}
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}
  # ── Build: Docker ───────────────────────────────────────────────────────────
  build-docker:
    name: Docker
    uses: hoprnet/hopr-workflows/.github/workflows/build-docker.yaml@43b03a7b5df777770d95c6524f48be34184b26fa # build-docker-v1
    needs: build-binaries
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      version_type: commit
      build_matrix: >-
        [
          {
            "runner": "depot-ubuntu-22.04-4",
            "architecture": "x86_64-linux",
            "build_command": "nix build -L .#docker-blokli-x86_64-linux",
            "smoke_test_command": "nix develop -c just smoke-test"
          }
        ]
      cachix_cache_name: blokli
      build_file: bloklid/Cargo.toml
      docker_image_name: bloklid
      docker_image_format: skopeo
      deployment_namespace: blokli
      deployment_label_selector: app.kubernetes.io/name=blokli
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  # ── Build: blokli-client ────────────────────────────────────────────────────
  build-client:
    name: Build blokli-client
    runs-on: depot-ubuntu-22.04-4
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@c8d45034bb33307dfda3b4dfcd1fc4000cadc05a # setup-nix-v1
        with:
          cachix_cache_name: blokli
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build blokli-client-dev
        run: nix build -L .#blokli-client-dev --no-link
  # ── Integration tests ──────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    needs: [build-docker]
    uses: ./.github/workflows/integration-test.yaml
    with:
      image: europe-west3-docker.pkg.dev/hoprassociation/docker-images/bloklid:${{ needs.build-docker.outputs.docker_build_version }}
    secrets: inherit
  publish-dry-run:
    name: Publish (dry run)
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: hoprnet/hopr-workflows/.github/workflows/publish-crates.yaml@e4fadaa70234b9d734d5c51b6900602e55492ce2 # workflow-publish-crates-v3
    permissions:
      contents: read
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      package: blokli-client
      version_type: commit
      runner: depot-ubuntu-22.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
