---
name: Close release Blokli Client
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  build-library:
    name: Build Library
    uses: hoprnet/hopr-workflows/.github/workflows/build-library.yaml@6c5db2cd898f1f2c8fdae39498b6d7b3ee7d0258 # build-library-v3
    permissions:
      contents: read
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      architecture: x86_64-linux
      cachix_cache_name: blokli
      build_file: client/Cargo.toml
      package_name: blokli-client
      runner: depot-ubuntu-24.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  release:
    name: Close release
    needs:
      - build-library
    runs-on: depot-ubuntu-24.04-2
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@6895dbbc515e39e0e283a68a80b8628ca6ead37a
        with:
          source_branch: ${{ github.ref_name }}
          file: client/Cargo.toml
          release_type: ${{ inputs.release_type }}
          release_tag_prefix: blokli-client-v
          cachix_cache_name: blokli
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: Blokli
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          github_token: ${{ secrets.GH_RUNNER_TOKEN }}
