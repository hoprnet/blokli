---
name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  build-binaries:
    name: Binary ${{ matrix.binary }} ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4
            build_command: nix build -L .#binary-blokli-x86_64-linux
            build_file: bloklid/Cargo.toml
            binary: bloklid
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4
            build_command: nix build -L .#binary-blokli-aarch64-linux
            build_file: bloklid/Cargo.toml
            binary: bloklid
          - architecture: aarch64-darwin
            runner: depot-macos-15
            build_command: nix build -L .#binary-blokli-aarch64-darwin
            build_file: bloklid/Cargo.toml
            binary: bloklid
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@build-binaries-v2
    permissions:
      contents: read
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: blokli
      build_file: ${{ matrix.build_file }}
      build_command: ${{ matrix.build_command }}
      binary: ${{ matrix.binary }}
      runner: ${{ matrix.runner }}
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}
  build-docker:
    name: Docker
    uses: hoprnet/hopr-workflows/.github/workflows/build-docker.yaml@43b03a7b5df777770d95c6524f48be34184b26fa # build-docker-v1
    needs: build-binaries
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      build_matrix: >-
        [
          {
            "runner": "depot-ubuntu-22.04-4",
            "architecture": "x86_64-linux",
            "build_command": "nix build -L .#docker-blokli-x86_64-linux"
          },
          {
            "runner": "depot-ubuntu-22.04-arm-4",
            "architecture": "aarch64-linux",
            "build_command": "nix build -L .#docker-blokli-aarch64-linux"
          }
        ]
      cachix_cache_name: blokli
      build_file: bloklid/Cargo.toml
      docker_image_name: bloklid
      docker_image_format: skopeo
      deployment_namespace: blokli
      deployment_label_selector: app.kubernetes.io/name=blokli
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      docker_hub_username: ${{ secrets.DOCKER_HUB_USERNAME }}
      docker_hub_token: ${{ secrets.DOCKER_HUB_TOKEN }}
  publish:
    name: Publish
    needs: [build-binaries]
    uses: hoprnet/hopr-workflows/.github/workflows/publish-crates.yaml@e4fadaa70234b9d734d5c51b6900602e55492ce2 # workflow-publish-crates-v3
    permissions:
      contents: read
    with:
      source_branch: ${{ github.ref_name }}
      package: blokli-client
      version_type: release
      runner: self-hosted-hoprnet-bigger
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  release:
    name: Close release
    needs:
      - build-binaries
      - build-docker
    runs-on: depot-ubuntu-22.04-2
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@release-version-v3
        with:
          source_branch: ${{ github.ref_name }}
          file: bloklid/Cargo.toml
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: blokli
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: Blokli
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          gcp_artifact_package: bloklid
          github_token: ${{ secrets.GH_RUNNER_TOKEN }}
  deploy-staging:
    name: Deploy Gnosis Staging
    runs-on: depot-ubuntu-22.04-2
    needs:
      - build-binaries
      - build-docker
      - release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Compute revision suffix
        id: revision
        run: echo "suffix=v$(echo '${{ needs.build-docker.outputs.docker_build_version }}' | tr '.' '-')" | tee -a "$GITHUB_OUTPUT"
      - name: Setup GCP
        id: gcp
        uses: hoprnet/hopr-workflows/actions/setup-gcp@7295b2131e2ed8f8e62a8fc2d8e550d62528adc6 # setup-gcp-v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGING }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT_STAGING }}
          install_sdk: "true"
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: blokli
          region: europe-west1
          image: europe-west3-docker.pkg.dev/hoprassociation/docker-images/bloklid:${{ needs.build-docker.outputs.docker_build_version }}
          suffix: ${{ steps.revision.outputs.suffix }}
          flags: --timeout=600s
