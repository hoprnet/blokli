---
name: Integration Test
on:
  workflow_call:
    inputs:
      image:
        description: Docker image to test
        required: true
        type: string
jobs:
  integration-test:
    name: Integration Tests
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 20
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Nix Cache
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: blokli
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
        env:
          USER: runner
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@12c56020e16036982e6cc529848edeedfc705865 # master
        with:
          google-credentials: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          login-artifact-registry: 'true'
          install-sdk: 'false'
      - name: Run Integration tests
        env:
          BLOKLI_TEST_REMOTE_IMAGE: ${{ inputs.image }}
        run: |-
          nix develop -c cargo test --package blokli-integration-tests
